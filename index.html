<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Solicitud de materiales gráficos | Verenize</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="page">

        <header class="header">

            <div>
                <h1>Solicitud de materiales gráficos</h1>

                <p>
                    Completa la información necesaria para solicitar materiales
                    publicitarios, promocionales o de comunicación personalizados.
                </p>
            </div>

            <div class="logo">
                <img src="LOGO+SLOGAN(NEGRO) (5).png" alt="Verenize">
            </div>

        </header>

        <section class="form-card">

            <form id="solicitudForm">

                <div class="form-group">
                    <label>Nombre del distribuidor *</label>
                    <input type="text" id="Nombre del socio comercial" 

                </div>

                <div class="form-group">
                    <label>Ciudad *</label>
                    <input type="text" id="ciudad" placeholder="Ej. Hermosillo, Sonora">
                </div>
<div class="form-group">
    <label>Celular que aparecerá en la publicidad</label>
    <input type="tel" id="celularPublicidad" placeholder="Ej. 6621234567">
</div>
                <div class="form-group">
                    <label>Tipo de material *</label>

                    <select id="tipoMaterial">
                        <option value="">Selecciona una opción</option>
                        <option>Flyer</option>
                        <option>Pendón</option>
                        <option>Tarjeta de presentación</option>
                        <option>Post para redes</option>
                        <option>Historia para redes</option>
                        <option>Imagen para WhatsApp</option>
                        <option>PDF Informativo</option>
                        <option>Promoción</option>
                        <option>Otro</option>
                    </select>
                </div>
<div id="camposFlyer" class="extra-fields oculto">

    <div class="form-group">
        <label>Nombre del evento</label>
        <input type="text" id="nombreEvento" placeholder="Ej. Certificación Rizos Toluca">
    </div>

    <div class="form-group">
        <label>Fecha del evento</label>
        <input type="date" id="fechaEvento">
    </div>

    <div class="form-group">
        <label>Hora del evento</label>
        <input type="time" id="horaEvento">
    </div>

    <div class="form-group">
        <label>Nombre del técnico / impartidor</label>
        <input type="text" id="tecnico" placeholder="Ej. Tenico profesional Ana P">
    </div>


    <div class="form-group">
        <label>Dirección completa</label>
        <input type="text" id="direccionEvento" placeholder="Calle, número, colonia, ciudad, CP">
    </div>

</div>
                <div class="form-group">
                    <label>Formato *</label>

                    <select id="formato">
                        <option value="">Selecciona una opción</option>
                        <option>Digital</option>
                        <option>Impreso</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Medidas o especificación breve</label>

                    <input
                        type="text"
                        id="medidas"
                        placeholder="Ej. Flyer para Instagram, Pendón 160x60 cm, Tarjeta personal">
                </div>

                <div class="form-group">
                    <label>Fecha requerida *</label>

                    <input type="date" id="fechaEntrega">
                </div>

                <div class="form-group">
                    <label>Uso del material *</label>

                    <textarea
                        id="objetivo"
                        placeholder="Describe brevemente para qué será utilizado el material."
                        rows="5"></textarea>
                </div>


                <button
                    type="button"
                    onclick="enviarWhatsApp()">
                    Enviar solicitud por WhatsApp
                </button>

            </form>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
