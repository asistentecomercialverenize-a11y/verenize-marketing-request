<style>

</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <img class="logo" src="LOGO+SLOGAN(NEGRO) (5).png" alt="Verenize">
        </div>

        <div class="header-info">
            <input id="socio" placeholder="Socio comercial">
            <input id="fecha" type="date">

            <div class="total-arriba">
                <div>TOTAL ACUMULADO: $<span id="totalArriba">0.00</span></div>
                <div class="reembolso-arriba">
                    Total Reembolso: $<span id="reembolsoArriba">0.00</span>
                </div>
            </div>
        </div>
    </div>

    <input
        type="text"
        id="buscador"
        class="buscador"
        placeholder="Buscar producto..."
        onkeyup="filtrarProductos()"
    >

    <table>
        <thead>
            <tr>
                <th>Foto</th>
                <th>Producto</th>
                <th>Precio Distribuidor</th>
                <th>Precio Subdistribuidor</th>
                <th>Pzas x Caja</th>
                <th>Cant. Pzas</th>
                <th>Cant. Cajas</th>
                <th>Desc.</th>
                <th>Importe</th>
            </tr>
        </thead>

        <tbody id="tabla"></tbody>
    </table>

    <div class="total-box">
        <div>TOTAL ACUMULADO: $<span id="total">0.00</span></div>
        <div class="reembolso-box">
            Total Reembolso: $<span id="reembolso">0.00</span>
        </div>
    </div>

    <div class="resumen">
        <h3>Resumen del Pedido</h3>
        <div id="resumenPedido">No hay productos seleccionados.</div>
    </div>

    <button class="enviar" onclick="enviarWhatsapp()">Enviar pedido por WhatsApp</button>
    <button class="limpiar" onclick="limpiar()">Limpiar pedido</button>

</div>

<script>
const whatsapp = "526623641909";
const metaReembolso = 104400;

const productos = [
["Tratamiento de Keratina VP8 1000 ml",1800,2500,16,true,"Trat_Proteina_1000ml.png"],
["Tratamiento de Keratina VP12 1000 ml",1800,2500,16,true,"Trat_Proteina_1000ml.png"],
["Kit de Keratina Brasileña 300 ml",800,1200,24,true,"Trat_Proteina_300ml.png"],
["Kit de Keratina Brasileña 100 ml",350,350,96,false,"Trat_Proteina_100ml.png"],

["Vereplex Pro No. 1 500 ml",280,360,48,true,"Vereplex_No1_500ml.png"],
["Kit Vereplex 500 ml",800,1200,24,false,"Vereplex_No1_500ml.png"],
["Vereplex Pro No. 2 500 ml",250,350,24,true,"Vereplex_No2_500ml.png"],

["Shampoo Purificante 1000 ml",350,416,16,true,"Shampoo_Purificante_1000ml.png"],

["Shampoo de Mantenimiento 500 ml",160,200,36,true,"Shampoo_mant_500ml.png"],
["Acondicionador de Mantenimiento 500 ml",160,200,36,true,"Acondicionador_Mant_500ml.png"],

["Shampoo de Mantenimiento 1000 ml",280,360,16,true,"Shampoo_Mant_1000ml.png"],
["Acondicionador de Mantenimiento 1000 ml",280,360,16,true,"Acondicionador_Mant_1000ml.png"],

["Kit de Mantenimiento 1000 ml",450,616,16,true,"Shampoo_Mant_1000ml.png"],
["Kit de Mantenimiento 500 ml",290,360,36,true,"Shampoo_mant_500ml.png"],
["Kit de Mantenimiento 100 ml",120,120,96,false,"Shampoo_Mant_100ml.png"],

["Tratamiento Sérum de Argán 100 ml",200,280,48,true,"Trat_SerumArgan_100ml.png"],
["Tratamiento Sérum de Argán 50 ml",120,120,63,false,"Trat_SerumArgan_50ml.png"],

["Tratamiento Leave In 300 ml",150,200,48,true,"Trat_LeaveIn_300ml.png"],
["Tratamiento Leave In 100 ml",85,85,96,false,"Trat_LeaveIn_100ml.png"],

["Crema Hidratante para Rizos 300 ml",130,190,48,true,"Crema_Hidratante_Rizos_300ml.png"],
["Gel Hidratante para Rizos 300 ml",145,200,48,true,"ButterGel_Hidratante_Rizos_300ml.png"],

["Shot de Reparación Instantánea 12 ml",80,80,48,false,"Shot_Reparacion_12ml.png"],
["Caja Shot de Reparación Instantánea",360,480,36,false,"Caja_Ampolletas.png"],

["Secadora V LUX NEGRA",2500,3150,10,true,"Secadora_V-Lux_Negra.png"],
["Secadora V LUX BLANCA",2500,3150,10,true,"Secadora_V-Lux_Blanca.png"],
["Plancha de Titanio",1200,1575,20,true,"Plancha_Titanio.png"],

["Peine de Carbón",25,42,50,true,"Peine_Carbon.png"],
["Cepillo Cuadrado",100,140,12,true,"Cepillo_Cuadrado.png"],
["Cepillo Redondo",160,200,10,true,"Cepillo_Redondo.png"],
["Brocha",25,42,50,true,"Brocha.png"],

["Kimono",250,350,20,false,"Kimono negro.png"],

["Mascarilla Mágica Nutritiva 100 ml",85,120,96,true,"Mascarilla_Magica_100ml.png"],
["Tratamiento Sérum de Argán 50 ml",120,150,96,true,"Trat_SerumArgan_50ml.png"],
["Mascarilla Mágica Nutritiva 500 ml",210,294,24,true,"Mascarilla_Magica_500ml.png"],

["Set de Viaje para Cuidado del Cabello",480,580,10,false,"Set_de_viaje.png"],
["Kit Vereplex PRO Sachet 30 ml",70,90,1,false,"Vereplex_No1_120ml.png"]
];

function cargarTabla(){
    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    productos.forEach((p,i)=>{
        tabla.innerHTML += `
        <tr>
            <td><img class="foto" src="${p[5]}" alt="${p[0]}"></td>
            <td class="producto">${p[0]}</td>
            <td>$${p[1]}</td>
            <td>$${p[2]}</td>
            <td>${p[3]}</td>
            <td>
                <input type="number" min="0" value="0" id="cantidad${i}" oninput="calcular()">
            </td>
            <td>
                <input type="number" min="0" value="0" id="cajasInput${i}" oninput="calcular()">
            </td>
            <td>${p[4] ? "10%" : "-"}</td>
            <td>$<span id="importe${i}">0.00</span></td>
        </tr>`;
    });
}

function calcular(){
    let total = 0;
    let resumenHTML = "";

    productos.forEach((p,i)=>{
        let cantPzas = Number(document.getElementById(`cantidad${i}`).value) || 0;
        let cantCajas = Number(document.getElementById(`cajasInput${i}`).value) || 0;

        let totalPiezas = cantPzas + (cantCajas * p[3]);

        let importe = 0;
        let precioAplicado = "";
        let descuentoTexto = "";

        if(totalPiezas >= p[3]){
            importe = totalPiezas * p[1];
            precioAplicado = "Distribuidor";
        }else{
            importe = totalPiezas * p[2];
            precioAplicado = "Subdistribuidor";

            if(p[4] && totalPiezas > 0){
                importe = importe * 0.90;
                descuentoTexto = " con 10% desc.";
            }
        }

        document.getElementById(`importe${i}`).innerText = importe.toFixed(2);

        if(totalPiezas > 0){
            resumenHTML += `
            <div style="margin-bottom:10px;">
                <strong>${p[0]}</strong><br>
                Piezas capturadas: ${cantPzas} |
                Cajas capturadas: ${cantCajas} |
                Total piezas: ${totalPiezas} |
                Precio aplicado: ${precioAplicado}${descuentoTexto} |
                Total: $${importe.toFixed(2)}
            </div>`;
        }

        total += importe;
    });

    if(resumenHTML === ""){
        resumenHTML = "No hay productos seleccionados.";
    }

    let reembolso = total > metaReembolso ? total - metaReembolso : 0;

    document.getElementById("total").innerText = total.toFixed(2);
    document.getElementById("totalArriba").innerText = total.toFixed(2);
    document.getElementById("reembolso").innerText = reembolso.toFixed(2);
    document.getElementById("reembolsoArriba").innerText = reembolso.toFixed(2);
    document.getElementById("resumenPedido").innerHTML = resumenHTML;
}

function filtrarProductos(){
    let filtro = document.getElementById("buscador").value.toLowerCase();
    let filas = document.querySelectorAll("#tabla tr");

    filas.forEach(fila=>{
        let producto = fila.querySelector(".producto").innerText.toLowerCase();

        if(producto.includes(filtro)){
            fila.style.display = "";
        }else{
            fila.style.display = "none";
        }
    });
}

function enviarWhatsapp(){
    let socio = document.getElementById("socio").value;
    let fecha = document.getElementById("fecha").value;
    let total = document.getElementById("total").innerText;
    let reembolso = document.getElementById("reembolso").innerText;

    let mensaje = `Hola, quiero realizar este pedido Verenize:%0A%0A`;
    mensaje += `Socio comercial: ${socio}%0A`;
    mensaje += `Fecha de pedido: ${fecha}%0A%0A`;

    productos.forEach((p,i)=>{
        let cantPzas = Number(document.getElementById(`cantidad${i}`).value) || 0;
        let cantCajas = Number(document.getElementById(`cajasInput${i}`).value) || 0;
        let totalPiezas = cantPzas + (cantCajas * p[3]);
        let importe = document.getElementById(`importe${i}`).innerText;

        if(totalPiezas > 0){
            mensaje += `Producto: ${p[0]}%0A`;
            mensaje += `Piezas capturadas: ${cantPzas}%0A`;
            mensaje += `Cajas capturadas: ${cantCajas}%0A`;
            mensaje += `Total piezas: ${totalPiezas}%0A`;

            if(totalPiezas >= p[3]){
                mensaje += `Precio aplicado: Distribuidor $${p[1]}%0A`;
            }else{
                mensaje += `Precio aplicado: Subdistribuidor $${p[2]}`;

                if(p[4]){
                    mensaje += ` | Desc. 10%`;
                }

                mensaje += `%0A`;
            }

            mensaje += `Importe: $${importe}%0A%0A`;
        }
    });

    mensaje += `TOTAL ACUMULADO: $${total}%0A`;
    mensaje += `TOTAL REEMBOLSO: $${reembolso}`;

    window.open(`https://wa.me/${whatsapp}?text=${mensaje}`,"_blank");
}

function limpiar(){
    productos.forEach((p,i)=>{
        document.getElementById(`cantidad${i}`).value = 0;
        document.getElementById(`cajasInput${i}`).value = 0;
    });

    document.getElementById("buscador").value = "";
    filtrarProductos();
    calcular();
}

document.getElementById("fecha").valueAsDate = new Date();
cargarTabla();
calcular();
</script>

</body>
</html>
