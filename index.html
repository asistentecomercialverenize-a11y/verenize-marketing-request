<body>

<div class="container">

<div class="header">
    <div>
        <h1>Solicitud de materiales gráficos</h1>
        <div class="subtitle">
            Completa la información necesaria para solicitar materiales publicitarios.
        </div>
    </div>

    <img class="logo" src="LOGO+SLOGAN(NEGRO) (5).png">
</div>

<div class="form-card">

<label>Nombre del socio comercial *</label>
<input id="socio">

<label>Ciudad *</label>
<input id="ciudad">

<label>Celular que aparecerá en la publicidad *</label>
<input id="celular">

<label>Tipo de material *</label>
<select id="tipo" onchange="mostrarCamposEvento()">
    <option value="">Selecciona una opción</option>
    <option value="Flyer promocional">Flyer promocional</option>
    <option value="Historia para redes">Historia para redes</option>
    <option value="Post para redes">Post para redes</option>
    <option value="Flyer de evento">Flyer de evento</option>
    <option value="Invitación / convocatoria">Invitación / convocatoria</option>
</select>

<div id="camposEvento" class="hidden">

<label>Nombre del evento *</label>
<input id="evento">

<label>Nombre del técnico *</label>
<input id="tecnico">

<label>Fecha del evento *</label>
<input id="fechaEvento" type="date">

<label>Hora del evento *</label>
<input id="horaEvento" type="time">

<label>Dirección completa *</label>
<input id="direccion">

</div>

<label>Producto, promoción o tema principal *</label>
<input id="tema">

<label>Texto que debe llevar el diseño</label>
<textarea id="texto"></textarea>

<label>Notas adicionales</label>
<textarea id="notas"></textarea>

<button onclick="enviarWhatsapp()">
Enviar solicitud por WhatsApp
</button>

</div>

</div>

<script src="script.js"></script>

</body>
