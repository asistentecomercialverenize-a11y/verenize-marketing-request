<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de materiales gráficos | Verenize</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="page">

        <section class="hero">
            <div>
                <h1>Solicitud de materiales gráficos</h1>
                <p>Completa la información para solicitar tus diseños de forma clara y organizada.</p>
            </div>

            <div class="brand">
                <span class="brand-icon">V</span>
                <span>Verenize</span>
            </div>
        </section>

        <section class="card">
            <form id="solicitudForm">

                <label>Nombre del distribuidor *</label>
                <input type="text" id="distribuidor" placeholder="Escribe el nombre del distribuidor" required>

                <label>Ciudad *</label>
                <input type="text" id="ciudad" placeholder="Escribe la ciudad" required>

                <label>Tipo de material *</label>
                <select id="tipoMaterial" required>
                    <option value="">Selecciona una opción</option>
                    <option value="Flyer">Flyer</option>
                    <option value="Pendón">Pendón</option>
                    <option value="Tarjeta de presentación">Tarjeta de presentación</option>
                    <option value="Post para redes">Post para redes</option>
                    <option value="Historia para redes">Historia para redes</option>
                    <option value="Imagen para WhatsApp">Imagen para WhatsApp</option>
                    <option value="PDF Informativo">PDF Informativo</option>
                    <option value="Promoción">Promoción</option>
                    <option value="Otro">Otro</option>
                </select>

                <label>Formato *</label>
                <select id="formato" required>
                    <option value="">Selecciona una opción</option>
                    <option value="Digital">Digital</option>
                    <option value="Impreso">Impreso</option>
                </select>

                <label>Medidas / especificación breve</label>
                <input type="text" id="medidas" placeholder="Ej. 160x60 cm, historia Instagram, PDF, WhatsApp">

                <label>Fecha requerida *</label>
                <input type="date" id="fechaEntrega" required>

                <label>Objetivo o uso del material *</label>
                <textarea id="objetivo" rows="5" placeholder="Ej. Promocionar certificación, anunciar promoción, uso interno, invitar clientes..." required></textarea>

                <div class="note">
                    Puedes adjuntar referencias, fotografías, logotipos o ejemplos en la tarjeta de Trello si es necesario.
                </div>

                <button type="button" onclick="enviarWhatsApp()">
                    Enviar solicitud por WhatsApp
                </button>

            </form>
        </section>

    </main>

<script src="script.js"></script>
</body>
</html>
